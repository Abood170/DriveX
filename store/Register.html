<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DRIVEX</title>
    <link rel="stylesheet" href="css/sty-login.css">
</head>
<body>
    <form method="post" action="#"  id="register-form">
        <h2>Join Us<span>DRIVE</span>X</h2>
        <p class="subtitle">Create your account now and explore all our features.</p>

        <input  type="text" placeholder="Enter User Name" id="username" required>
        <br>
        <input  type="password" placeholder="Enter Password" id="password">
        <br>
        <input  type="email" placeholder="Enter Email" id="email" required>
        <br>
        <input  type="date" placeholder="Enter Date of birth" id="dob">
        <br>

        <button type="submit">Register</button>


        <p>Already have an account?<a href="signin.html">Log In Here</a></p>
        <a href="store.html" class="back-home">Back to Home</a>
    </form>
    <script src="js/script.js"></script>
</body>
</html>
